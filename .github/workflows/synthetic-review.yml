name: Synthetic Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
      event:
        description: Review event (APPROVE, REQUEST_CHANGES, COMMENT)
        required: false
        default: REQUEST_CHANGES
      body:
        description: Review body
        required: false
        default: Synthetic review from github-actions[bot] for ghent stale-review testing.

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Post synthetic review
        uses: actions/github-script@v7
        with:
          script: |
            const pull_number = Number(core.getInput("pr_number"));
            const event = core.getInput("event");
            const body = core.getInput("body");

            const review = await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
              event,
              body,
            });

            core.notice(`Created review ${review.data.id} with state ${review.data.state}`);
